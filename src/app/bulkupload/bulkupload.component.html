<div class="card shadow border-0 rounded-4 p-4 mt-3 bg-white">
  <div class="upload-box border-2 border-dashed rounded-3 p-5 text-center bg-light">
    
    <input type="file" (change)="onFileChange($event)" class="form-control mb-3" accept=".xlsx, .xls, .csv">
    <p class="text-muted small mb-0">Supports .xlsx, .xls and .csv files</p>
    
    <div *ngIf="excelData && excelData.length > 0" class="mt-4 animate__animated animate__fadeIn">
      
      <div class="table-responsive mb-3" style="max-height: 200px; overflow-y: auto;">
        <table class="table table-sm table-bordered bg-white small">
          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Price</th>
              <th>Category</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of excelData | slice:0:5">
              <td>{{ row.name }}</td>
              <td>₹{{ row.price }}</td>
              <td>{{ row.category }}</td>
            </tr>
          </tbody>
        </table>
        <small class="text-muted" *ngIf="excelData.length > 5">...and {{ excelData.length - 5 }} more products.</small>
      </div>

      <div class="alert alert-success border-0 shadow-sm py-2">
        <i class="bi bi-check-circle-fill me-2"></i>
        <strong>{{ excelData.length }}</strong> products detected in the file.
      </div>
      
      <button class="btn btn-success w-100 py-3 fw-bold shadow text-uppercase rounded-3" (click)="confirmUpload()">
        <i class="bi bi-cloud-upload-fill me-2"></i> Confirm & Upload to Inventory
      </button>

      <button class="btn btn-link btn-sm text-danger mt-2" (click)="excelData = []">Clear Selection</button>
    </div>

  </div>
</div>
